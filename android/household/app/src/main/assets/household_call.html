<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* Door panel video fills the screen */
        #remoteVideo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* Local (household) camera — small PiP in top-right corner */
        #localVideo {
            position: fixed; top: 16px; right: 16px;
            width: 100px; height: 140px;
            object-fit: cover; border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.4);
            z-index: 10; display: none;
        }

        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 8px 20px; border-radius: 20px; font-size: 16px;
            z-index: 20; white-space: nowrap;
        }

        #controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; gap: 16px;
            padding: 16px 20px 24px; z-index: 20;
        }

        .btn {
            border: none; border-radius: 12px; font-size: 18px; font-weight: 700;
            padding: 0 28px; height: 56px; cursor: pointer; color: #fff;
        }
        #btnUnlock  { background: #238636; flex: 1; max-width: 240px; }
        #btnHangup  { background: #da3633; min-width: 72px; }
    </style>
</head>
<body>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay playsinline muted></video>
    <div id="status">Connecting…</div>
    <div id="controls">
        <button class="btn" id="btnUnlock" onclick="unlock()">Unlock Door</button>
        <button class="btn" id="btnHangup" onclick="hangup()">&#x260E;</button>
    </div>

    <script>
        var pc = null;

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        function waitForIce(conn) {
            return new Promise(function(resolve) {
                if (conn.iceGatheringState === 'complete') { resolve(); return; }
                var t = setTimeout(resolve, 5000);
                conn.onicegatheringstatechange = function() {
                    if (conn.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
                };
            });
        }

        window.onWebRtcOffer = async function(offerJson) {
            try {
                var offer = JSON.parse(offerJson);
                if (!offer || !offer.sdp) { setStatus('Invalid offer'); return; }

                if (offer.ts && Date.now() - offer.ts > 120000) {
                    setStatus('Stale call — please ring again');
                    return;
                }

                setStatus('Connecting…');

                pc = new RTCPeerConnection({ iceServers: [] });

                pc.ontrack = function(e) {
                    var v = document.getElementById('remoteVideo');
                    if (e.streams && e.streams[0]) {
                        v.srcObject = e.streams[0];
                    } else {
                        if (!v.srcObject) v.srcObject = new MediaStream();
                        v.srcObject.addTrack(e.track);
                    }
                    v.play().catch(function() {});
                };

                pc.onconnectionstatechange = function() {
                    var s = pc.connectionState;
                    if (s === 'connected') {
                        document.getElementById('status').style.display = 'none';
                    } else if (s === 'failed') {
                        setStatus('Connection failed');
                        Android.onCallEnd('failed');
                    } else if (s === 'disconnected') {
                        setStatus('Reconnecting…');
                        document.getElementById('status').style.display = '';
                    }
                };

                // Correct answerer order: set remote description first, then add tracks
                await pc.setRemoteDescription(offer.sdp);

                try {
                    var videoStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: 'user' } }, audio: false
                    });
                    var localVid = document.getElementById('localVideo');
                    localVid.srcObject = videoStream;
                    localVid.style.display = 'block';
                    videoStream.getTracks().forEach(function(t) { pc.addTrack(t, videoStream); });
                } catch (camErr) {
                    // Camera unavailable — proceed as receive-only
                }

                var answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await waitForIce(pc);

                Android.publishAnswer(JSON.stringify(pc.localDescription));
                setStatus('Waiting for panel…');

            } catch(e) {
                setStatus('Error: ' + e.message);
            }
        };

        function unlock() {
            Android.unlockDoor();
            var btn = document.getElementById('btnUnlock');
            btn.textContent = '✓ Unlocked!';
            btn.style.background = '#1158c7';
            setTimeout(function() {
                btn.textContent = 'Unlock Door';
                btn.style.background = '';
            }, 3000);
        }

        function hangup() {
            if (pc) { pc.close(); pc = null; }
            Android.onCallEnd('hangup');
        }

        window.addEventListener('pagehide', function() {
            if (pc) pc.close();
        });
    </script>
</body>
</html>
