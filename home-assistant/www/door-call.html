<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Door Entry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #0d1117; font-family: sans-serif; overflow: hidden; }

        #videoWrap {
            position: relative;
            width: 100%;
            height: calc(100% - 90px);
            background: #000;
        }
        #remoteVideo {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        #statusMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #8b949e; font-size: 16px; text-align: center; pointer-events: none;
        }

        #controls {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: #161b22; border-top: 1px solid #30363d;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 12px 20px;
        }
        #btn-unlock {
            background: #238636; color: #fff; border: none;
            border-radius: 10px; font-size: 20px; font-weight: 700;
            padding: 0 40px; height: 56px; width: 100%; max-width: 300px;
            cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s;
        }
        #btn-unlock:active  { background: #196127; }
        #btn-unlock:disabled { opacity: 0.7; cursor: default; }

        #btn-close {
            background: #6e7681; color: #fff; border: none;
            border-radius: 10px; font-size: 20px; font-weight: 700;
            padding: 0 20px; height: 56px; min-width: 64px;
            cursor: pointer; transition: background 0.15s; flex-shrink: 0;
        }
        #btn-close:active { background: #484f58; }

        #btn-unmute {
            display: none;
            background: #1f6feb; color: #fff; border: none;
            border-radius: 10px; font-size: 18px; font-weight: 700;
            padding: 0 16px; height: 56px; min-width: 64px;
            cursor: pointer; flex-shrink: 0;
        }
        #btn-unmute:active { background: #1158c7; }

        #toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.82); color: #fff;
            padding: 8px 20px; border-radius: 20px; font-size: 15px; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="videoWrap">
        <video id="remoteVideo" autoplay playsinline muted></video>
        <div id="statusMsg">Waiting for door panel…</div>
    </div>

    <!-- Debug overlay — remove once video is working -->
    <div id="dbg" style="position:fixed;top:4px;right:4px;background:rgba(0,0,0,.85);color:#0f0;
         font:11px/1.5 monospace;padding:6px 10px;border-radius:6px;z-index:999;white-space:pre;
         pointer-events:none;max-width:260px;"></div>

    <div id="controls">
        <button id="btn-unlock" onclick="unlock()">Unlock Door</button>
        <button id="btn-unmute" onclick="unmute()">🔊</button>
        <button id="btn-close" onclick="closePage()">Close</button>
    </div>

    <!--
      MQTT.js connects to Mosquitto over WebSocket (port 9001).
      RTCPeerConnection is receive-only — no getUserMedia() call —
      so this page works over plain HTTP with no browser warnings.
    -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script>
        // Credentials are passed via URL params by the HA notification action.
        // e.g. door-call.html?u=door_panel&p=yourpassword
        var params = new URLSearchParams(window.location.search);
        // Use explicit broker IP from URL param to avoid mDNS resolution issues.
        // e.g. ?h=192.168.68.50&u=door_panel&p=yourpassword
        var brokerHost = params.get('h') || window.location.hostname;
        var pc = null;

        var mqttStatus = 'connecting…';
        var lastOfferInfo = '';

        var mqttClient = mqtt.connect('ws://' + brokerHost + ':1884', {
            username: params.get('u') || 'door_panel',
            password: params.get('p') || '',
            clientId: 'home_rtc_' + Math.random().toString(16).slice(2, 8)
        });

        mqttClient.on('connect', function() {
            mqttStatus = 'connected';
            mqttClient.subscribe('door/webrtc/offer');
        });
        mqttClient.on('error', function(e) { mqttStatus = 'ERR ' + e.message; });
        mqttClient.on('close', function()  { mqttStatus = 'closed'; });
        mqttClient.on('offline', function(){ mqttStatus = 'offline'; });

        mqttClient.on('message', async function(topic, payload) {
            if (topic !== 'door/webrtc/offer') return;
            var msg = payload.toString();
            if (!msg) { lastOfferInfo = 'empty (cleared)'; return; }

            try {
                var data = JSON.parse(msg);
                if (!data.sdp) { lastOfferInfo = 'no sdp field'; return; }

                var age = data.ts ? Math.round((Date.now() - data.ts) / 1000) : '?';
                lastOfferInfo = 'age=' + age + 's';

                // Ignore offers older than 2 minutes (stale retained messages)
                if (data.ts && Date.now() - data.ts > 120000) {
                    lastOfferInfo = 'STALE (' + age + 's old)';
                    document.getElementById('statusMsg').textContent = 'No active call (stale offer).';
                    return;
                }

                // Close any previous attempt
                if (pc) { pc.close(); pc = null; }

                // Receive-only peer connection — no getUserMedia() → HTTP is fine
                pc = new RTCPeerConnection({ iceServers: [] });

                // Collect panel's ICE candidate IPs from the offer SDP
                var remoteIPs = (data.sdp.sdp || '').match(/a=candidate:[^\r\n]+/g);
                remoteIPs = remoteIPs
                    ? remoteIPs.map(function(c){ return c.split(' ')[4]; })
                              .filter(function(ip,i,a){ return a.indexOf(ip)===i; })
                    : [];
                lastOfferInfo += ' ips=[' + remoteIPs.join(',') + ']';

                pc.ontrack = function(e) {
                    var v = document.getElementById('remoteVideo');
                    if (e.streams && e.streams[0]) {
                        v.srcObject = e.streams[0];
                    } else {
                        if (!v.srcObject) v.srcObject = new MediaStream();
                        v.srcObject.addTrack(e.track);
                    }
                    v.play().then(function() {
                        document.getElementById('statusMsg').style.display = 'none';
                        document.getElementById('btn-unmute').style.display = 'inline-block';
                    }).catch(function(err) {
                        // Autoplay blocked — ask user to tap (common on mobile)
                        document.getElementById('statusMsg').textContent = '▶ Tap to watch';
                        document.getElementById('statusMsg').style.display = '';
                        document.getElementById('statusMsg').style.pointerEvents = 'auto';
                        document.getElementById('statusMsg').style.cursor = 'pointer';
                        document.getElementById('statusMsg').style.fontSize = '28px';
                        document.getElementById('statusMsg').style.color = '#fff';
                        document.getElementById('videoWrap').onclick = function() {
                            v.play().catch(function(){});
                            document.getElementById('statusMsg').style.display = 'none';
                            document.getElementById('btn-unmute').style.display = 'inline-block';
                            document.getElementById('videoWrap').onclick = null;
                        };
                    });
                };

                pc.oniceconnectionstatechange = function() {
                    // Update debug overlay only — don't touch statusMsg here
                };

                pc.onconnectionstatechange = function() {
                    var s = pc.connectionState;
                    if (s === 'connected') {
                        // ICE is up and media is flowing — retry play() in case it was called too early
                        var v = document.getElementById('remoteVideo');
                        if (v.paused) v.play().catch(function(){});
                    } else if (s === 'failed') {
                        setTimeout(closePage, 2000);
                    }
                    // 'disconnected' is transient — ICE can self-recover, don't close
                };

                await pc.setRemoteDescription(data.sdp);
                var answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                // Wait for ICE gathering (local LAN candidates only — fast)
                await new Promise(function(resolve) {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    var t = setTimeout(resolve, 5000);
                    pc.onicegatheringstatechange = function() {
                        if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
                    };
                });

                mqttClient.publish('door/webrtc/answer',
                    JSON.stringify(pc.localDescription),
                    { retain: false, qos: 1 });

            } catch(e) {
                console.error('WebRTC error:', e);
                document.getElementById('statusMsg').textContent = 'Connection error — try refreshing.';
            }
        });

        function unmute() {
            var v = document.getElementById('remoteVideo');
            v.muted = false;
            document.getElementById('btn-unmute').style.display = 'none';
        }

        function closePage() {
            if (pc) { pc.close(); pc = null; }
            if (mqttClient) mqttClient.end();
            // window.close() only works on windows opened by window.open() — navigate back instead
            if (document.referrer) {
                history.back();
            } else {
                window.location.replace(window.location.origin);
            }
        }

        function toast(msg, color) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.style.background = color || 'rgba(0,0,0,0.82)';
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 3000);
        }

        function unlock() {
            var btn = document.getElementById('btn-unlock');
            btn.disabled = true;
            btn.textContent = 'Unlocking…';
            fetch('/api/webhook/door_unlock_from_call', { method: 'POST' })
                .then(function() {
                    btn.textContent = '✓  Unlocked!';
                    btn.style.background = '#1158c7';
                    toast('Door unlocked!', 'rgba(17,88,199,0.9)');
                    setTimeout(function() {
                        btn.disabled = false;
                        btn.textContent = '🔓 \u00a0Unlock Door';
                        btn.style.background = '';
                    }, 4000);
                })
                .catch(function() {
                    btn.disabled = false;
                    btn.textContent = '🔓 \u00a0Unlock Door';
                    toast('Failed — check connection', 'rgba(183,28,28,0.9)');
                });
        }

        // Debug overlay — polls every second and reports exactly what's happening
        setInterval(function() {
            var v = document.getElementById('remoteVideo');
            var lines = ['v4 mqtt:' + mqttStatus];
            lines.push('offer: ' + (lastOfferInfo || 'none'));
            if (pc) {
                lines.push('conn: ' + pc.connectionState);
                lines.push('ice:  ' + pc.iceConnectionState);
            } else {
                lines.push('pc: null');
            }
            if (v.srcObject) {
                var tracks = v.srcObject.getTracks();
                lines.push('tracks: ' + tracks.length);
                tracks.forEach(function(t) {
                    lines.push('  ' + t.kind + ' ' + t.readyState + (t.enabled ? '' : ' DISABLED'));
                });
            } else {
                lines.push('srcObject: null');
            }
            lines.push('size: ' + v.videoWidth + 'x' + v.videoHeight + ' paused:' + v.paused);
            if (v.error) lines.push('ERR: ' + v.error.message);
            document.getElementById('dbg').textContent = lines.join('\n');
        }, 1000);
    </script>
</body>
</html>
