# Mosquitto WebSocket listener — required for door-call.html to signal WebRTC via MQTT.js
#
# Deploy: copy this file to /share/mosquitto/websockets.conf on HA, then restart
#         the Mosquitto Broker add-on (Settings → Add-ons → Mosquitto Broker → Restart).
#
# The main TCP listener (port 1883) keeps its existing auth config unchanged.
# Anonymous access on this port is intentional — it is local-network-only and
# the WebSocket client only reads/writes the door/webrtc/* signaling topics.

listener 9001
protocol websockets
allow_anonymous true
